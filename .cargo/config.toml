[env]
CMAKE_POLICY_VERSION_MINIMUM = "3.5"
CXXFLAGS = "-include cstdint"

# mold linker: large link-time speedup, most noticeable for the Bevy-sized
# dependency graphs in crates/vse-bevy. gcc >= 12 supports -fuse-ld=mold.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
